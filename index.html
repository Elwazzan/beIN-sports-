<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDATA SPORT - Professional Player</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #121212;
            --bg-grey: #1e1e1e;
            --text-white: #ffffff;
            --accent-grey: #2d2d2d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: black;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--primary-color);
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        /* Video Area */
        .video-wrapper {
            flex: 3;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #my-video {
            width: 100% !important;
            height: 100% !important;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 60px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
        }

        /* Sidebar Playlist */
        .playlist {
            flex: 1;
            background-color: var(--bg-grey);
            border-left: 1px solid var(--accent-grey);
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }

        .playlist-header {
            padding: 20px;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--primary-color);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-list::-webkit-scrollbar {
            width: 6px;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        .channel-item {
            background-color: var(--accent-grey);
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background-color: #333;
            transform: scale(1.02);
            border-color: var(--primary-color);
        }

        .channel-item.active {
            background-color: var(--primary-color);
            border-color: #fff;
        }

        .channel-item i {
            font-size: 20px;
        }

        /* VideoJS Customization */
        .vjs-theme-city .vjs-play-progress, .vjs-theme-city .vjs-volume-level {
            background-color: var(--primary-color);
        }
        
        .vjs-big-play-button {
            background-color: rgba(255, 0, 0, 0.7) !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            border: none !important;
        }

        /* Fullscreen Watermark adjust */
        .video-js.vjs-fullscreen .watermark {
            bottom: 100px;
            left: 50px;
            font-size: 50px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .playlist { max-width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">EDATA <span>SPORT</span></div>
        <div class="status"><i class="fas fa-circle" style="color: #00ff00; font-size: 10px;"></i> مباشر</div>
    </header>

    <div class="container">
        <!-- Player -->
        <div class="video-wrapper">
            <div class="video-container" id="video-box">
                <video id="my-video" class="video-js vjs-big-play-centered vjs-show-big-play-button-on-pause" controls preload="auto" data-setup='{"fluid": true}'>
                    <p class="vjs-no-js">To view this video please enable JavaScript</p>
                </video>
                <div class="watermark">EDATA</div>
            </div>
        </div>

        <!-- Playlist -->
        <div class="playlist">
            <div class="playlist-header">
                <i class="fas fa-list-ul"></i> قائمة القنوات
            </div>
            <div class="channel-list" id="channelList">
                <!-- Channels injected by JS -->
            </div>
        </div>
    </div>

    <!-- Video.js Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script>
        const channels = [
            { name: "Aflam shahid", url: "https://shd-amg-fast.edgenextcdn.net/tx001/playlist.m3u8" },
            { name: "beIN sports 2 LQ", url: "http://so.ta2al.us/live/maro2653/4838332000/618157.m3u8" },
            { name: "beIN sports 3 LQ", url: "http://so.ta2al.us/live/maro2653/4838332000/117974.m3u8" },
            { name: "beIN sports 4 LQ", url: "http://so.ta2al.us/live/maro2653/4838332000/698573.m3u8" },
            { name: "beIN sports 5 LQ", url: "http://so.ta2al.us/live/maro2653/4838332000/332578.m3u8" },
            { name: "beIN sports 6 LQ", url: "http://so.ta2al.us/live/maro2653/4838332000/407331.m3u8" },
            { name: "beIN sports 1 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/35767.m3u8" },
            { name: "beIN sports 2 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/131825.m3u8" },
            { name: "beIN sports 3 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/652548.m3u8" },
            { name: "beIN sports 4 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/243256.m3u8" },
            { name: "beIN sports 5 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/35682.m3u8" },
            { name: "beIN sports 6 SD", url: "http://so.ta2al.us/live/maro2653/4838332000/641814.m3u8" }
        ];

        const player = videojs('my-video');
        const channelListContainer = document.getElementById('channelList');

        // Function to load channel
        function loadChannel(url, element) {
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();

            // Highlight active channel
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        // Initialize Playlist
        channels.forEach((channel, index) => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `
                <i class="fas fa-play-circle"></i>
                <span>${channel.name}</span>
            `;
            div.onclick = () => loadChannel(channel.url, div);
            channelListContainer.appendChild(div);

            // Play first channel by default
            if(index === 0) loadChannel(channel.url, div);
        });

        // VLC features: Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                player.paused() ? player.play() : player.pause();
            }
            if (e.code === 'KeyF') {
                player.isFullscreen() ? player.exitFullscreen() : player.requestFullscreen();
            }
        });

        // Error handling
        player.on('error', function() {
            console.log("Error loading stream. The link might be expired or protected by CORS.");
        });
    </script>
</body>
</html>
