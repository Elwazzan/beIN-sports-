<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDATA Sport - مشغل القنوات الرياضية</title>
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.6.1/dist/video-js.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(90deg, #000 0%, #1a1a1a 100%);
      padding: 20px 30px;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ff0000;
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(45deg, #ff0000, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    .controls-header {
      display: flex;
      gap: 15px;
    }

    .btn-header {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    }

    .btn-header:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 0, 0, 0.5);
    }

    /* Main Container */
    .main-container {
      display: flex;
      height: calc(100vh - 83px);
    }

    /* Video Section */
    .video-section {
      flex: 1;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video-player {
      width: 100%;
      height: 100%;
    }

    .video-js {
      width: 100% !important;
      height: 100% !important;
    }

    .video-js .vjs-big-play-button {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      border: none;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      font-size: 40px;
      line-height: 80px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .video-js .vjs-control-bar {
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.9));
      height: 60px;
    }

    .video-js .vjs-play-progress {
      background: linear-gradient(90deg, #ff0000, #ff6b6b);
    }

    .video-js .vjs-volume-level {
      background: #ff0000;
    }

    /* Watermark */
    .watermark {
      position: absolute;
      bottom: 80px;
      left: 30px;
      font-size: 48px;
      font-weight: 900;
      color: rgba(255, 0, 0, 0.3);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 999;
      letter-spacing: 3px;
    }

    /* Playlist Sidebar */
    .playlist-sidebar {
      width: 380px;
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border-left: 3px solid #ff0000;
      display: flex;
      flex-direction: column;
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
    }

    .playlist-header {
      padding: 20px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
    }

    .playlist-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    /* Custom Scrollbar */
    .playlist-container::-webkit-scrollbar {
      width: 8px;
    }

    .playlist-container::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .playlist-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ff0000, #cc0000);
      border-radius: 10px;
    }

    /* Channel Item */
    .channel-item {
      background: linear-gradient(135deg, #2d2d2d, #1a1a1a);
      margin-bottom: 12px;
      padding: 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .channel-item:hover {
      transform: translateX(-5px);
      border-color: #ff0000;
      box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
    }

    .channel-item.active {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      border-color: #fff;
      box-shadow: 0 5px 25px rgba(255, 0, 0, 0.6);
    }

    .channel-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #ff0000, #ff6b6b);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }

    .channel-item.active .channel-icon {
      background: #fff;
      color: #ff0000;
    }

    .channel-info {
      flex: 1;
    }

    .channel-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .channel-quality {
      font-size: 12px;
      opacity: 0.8;
    }

    .channel-status {
      width: 10px;
      height: 10px;
      background: #00ff00;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Fullscreen Watermark */
    .video-js.vjs-fullscreen .watermark {
      bottom: 100px;
      left: 40px;
      font-size: 64px;
    }

    /* Loading Spinner */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 0, 0, 0.2);
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .playlist-sidebar {
        width: 100%;
        position: absolute;
        bottom: 0;
        height: 40%;
        border-left: none;
        border-top: 3px solid #ff0000;
        z-index: 100;
      }

      .main-container {
        flex-direction: column;
      }

      .video-section {
        height: 60%;
      }
    }

    /* Now Playing Info */
    .now-playing {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 25px;
      border-radius: 10px;
      border-left: 4px solid #ff0000;
      z-index: 99;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .now-playing-title {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 5px;
    }

    .now-playing-channel {
      font-size: 18px;
      font-weight: 700;
      color: #ff0000;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <i class="fas fa-play-circle"></i> EDATA SPORT
    </div>
    <div class="controls-header">
      <button class="btn-header" onclick="toggleFullscreen()">
        <i class="fas fa-expand"></i> ملء الشاشة
      </button>
    </div>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    
    <!-- Video Section -->
    <div class="video-section">
      <video id="video-player" class="video-js vjs-big-play-centered" controls preload="auto">
        <p class="vjs-no-js">
          To view this video please enable JavaScript
        </p>
      </video>
      
      <!-- Watermark -->
      <div class="watermark">EDATA</div>

      <!-- Now Playing Info -->
      <div class="now-playing" id="nowPlaying" style="display: none;">
        <div class="now-playing-title">الآن على الهواء</div>
        <div class="now-playing-channel" id="currentChannel">beIN Sports 1</div>
      </div>

      <!-- Loading Spinner -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Playlist Sidebar -->
    <div class="playlist-sidebar">
      <div class="playlist-header">
        <i class="fas fa-list"></i> قائمة القنوات
      </div>
      <div class="playlist-container" id="playlistContainer">
        <!-- Channels will be loaded here by JavaScript -->
      </div>
    </div>

  </div>

  <!-- Video.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/video.js@8.6.1/dist/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

  <script>
    // Channels Data
    const channels = [
      { name: 'beIN Sports 1', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/194432.m3u8' },
      { name: 'beIN Sports 2', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/618157.m3u8' },
      { name: 'beIN Sports 3', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/117974.m3u8' },
      { name: 'beIN Sports 4', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/698573.m3u8' },
      { name: 'beIN Sports 5', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/332578.m3u8' },
      { name: 'beIN Sports 6', quality: 'LQ', url: 'http://so.ta2al.us/live/maro2653/4838332000/407331.m3u8' },
      { name: 'beIN Sports 1', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/35767.m3u8' },
      { name: 'beIN Sports 2', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/131825.m3u8' },
      { name: 'beIN Sports 3', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/652548.m3u8' },
      { name: 'beIN Sports 4', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/243256.m3u8' },
      { name: 'beIN Sports 5', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/35682.m3u8' },
      { name: 'beIN Sports 6', quality: 'SD', url: 'http://so.ta2al.us/live/maro2653/4838332000/641814.m3u8' }
    ];

    // Initialize Video.js Player
    const player = videojs('video-player', {
      controls: true,
      autoplay: false,
      preload: 'auto',
      fluid: false,
      fill: true,
      responsive: true,
      playbackRates: [0.5, 1, 1.5, 2],
      controlBar: {
        volumePanel: { inline: false }
      }
    });

    // Load Channels into Playlist
    const playlistContainer = document.getElementById('playlistContainer');
    const nowPlaying = document.getElementById('nowPlaying');
    const currentChannelEl = document.getElementById('currentChannel');
    const loading = document.getElementById('loading');

    channels.forEach((channel, index) => {
      const channelItem = document.createElement('div');
      channelItem.className = 'channel-item';
      if (index === 0) channelItem.classList.add('active');
      
      channelItem.innerHTML = `
        <div class="channel-icon">${channel.quality}</div>
        <div class="channel-info">
          <div class="channel-name">${channel.name}</div>
          <div class="channel-quality">جودة ${channel.quality}</div>
        </div>
        <div class="channel-status"></div>
      `;

      channelItem.onclick = () => playChannel(channel, channelItem);
      playlistContainer.appendChild(channelItem);
    });

    // Play Channel Function
    function playChannel(channel, element) {
      // Remove active class from all items
      document.querySelectorAll('.channel-item').forEach(item => {
        item.classList.remove('active');
      });

      // Add active class to clicked item
      element.classList.add('active');

      // Show loading
      loading.style.display = 'block';

      // Update now playing info
      currentChannelEl.textContent = `${channel.name} - ${channel.quality}`;
      nowPlaying.style.display = 'block';

      // Load and play the stream
      player.src({
        src: channel.url,
        type: 'application/x-mpegURL'
      });

      player.ready(function() {
        player.play().then(() => {
          loading.style.display = 'none';
          setTimeout(() => {
            nowPlaying.style.display = 'none';
          }, 3000);
        }).catch(error => {
          console.error('Error playing video:', error);
          loading.style.display = 'none';
        });
      });
    }

    // Auto-play first channel on load
    window.addEventListener('load', () => {
      const firstChannel = channels[0];
      const firstChannelElement = document.querySelector('.channel-item');
      playChannel(firstChannel, firstChannelElement);
    });

    // Fullscreen Toggle
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        player.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    // Loading indicator on waiting
    player.on('waiting', () => {
      loading.style.display = 'block';
    });

    player.on('playing', () => {
      loading.style.display = 'none';
    });

    // Error handling
    player.on('error', () => {
      loading.style.display = 'none';
      alert('حدث خطأ في تحميل القناة، يرجى المحاولة مرة أخرى');
    });
  </script>

</body>
</html>
